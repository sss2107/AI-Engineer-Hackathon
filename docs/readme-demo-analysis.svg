        <rect width="146" height="40" rx="12"/><rect x="158" width="146" height="40" rx="12"/><rect x="316" width="146" height="40" rx="12"/><rect x="474" width="146" height="40" rx="12"/><rect x="632" width="146" height="40" rx="12"/><rect x="790" width="146" height="40" rx="12"/><rect x="948" width="146" height="40" rx="12"/>
      </g>
      <g fill="#f6f1e8" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850">
