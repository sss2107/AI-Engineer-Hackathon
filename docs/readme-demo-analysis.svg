        <text x="24" y="125" fill="#f6f1e8" font-size="24" font-weight="900">is under-specified.</text>
        <text x="24" y="164" fill="#d5ddd3" font-size="18" font-weight="750">Parser fallback exists, but malformed</text>
        <text x="24" y="190" fill="#d5ddd3" font-size="18" font-weight="750">payload handling is not proven.</text>
        <text x="414" y="45" fill="#ff7769" font-size="13" font-weight="900">LATE PROOF</text>
        <text x="414" y="96" fill="#f6f1e8" font-size="24" font-weight="900">Validated only after the</text>
        <text x="414" y="125" fill="#f6f1e8" font-size="24" font-weight="900">implementation was done.</text>
        <text x="414" y="164" fill="#d5ddd3" font-size="18" font-weight="750">Tests were deferred until after</text>
        <text x="414" y="190" fill="#d5ddd3" font-size="18" font-weight="750">the core parser path was wired.</text>
        <text x="804" y="45" fill="#ffd166" font-size="13" font-weight="900">AGENT WORKFLOW GAP</text>
        <text x="804" y="96" fill="#f6f1e8" font-size="24" font-weight="900">Used AI as a generator,</text>
        <text x="804" y="125" fill="#f6f1e8" font-size="24" font-weight="900">not a managed workflow.</text>
        <text x="804" y="164" fill="#d5ddd3" font-size="18" font-weight="750">No planner, reviewer, tester, or</text>
        <text x="804" y="190" fill="#d5ddd3" font-size="18" font-weight="750">acceptance criteria loop.</text>
      </g>
