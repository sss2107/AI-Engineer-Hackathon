    <text x="1052" y="62" text-anchor="middle" fill="#ffd166" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">79% evidence confidence</text>
    <g transform="translate(28 112)">
      <rect width="350" height="240" rx="18" fill="#151819" stroke="#ff7769" stroke-width="4"/>
      <rect x="390" width="350" height="240" rx="18" fill="#151819" stroke="#ff7769" stroke-width="4"/>
      <rect x="780" width="350" height="240" rx="18" fill="#151819" stroke="#ffd166" stroke-width="4"/>
