    <text x="618" y="24" fill="#aab5af" font-size="14" font-weight="900">Communication</text>
    <text x="618" y="48" fill="#f6f1e8" font-size="25" font-weight="900">Strong</text>
    <rect x="900" width="275" height="58" rx="16" fill="#151a1d" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="918" y="24" fill="#aab5af" font-size="14" font-weight="900">Delivery risk</text>
    <text x="918" y="48" fill="#f6f1e8" font-size="25" font-weight="900">Medium</text>
