<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="InterviewOS opening demo screen">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#080a0d"/>
      <stop offset="0.55" stop-color="#111716"/>
      <stop offset="1" stop-color="#091011"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" x2="1">
      <stop stop-color="#b9f251"/>
      <stop offset="1" stop-color="#55e4b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#ffffff" stroke-width="1">
    <path d="M0 95h1280M0 190h1280M0 285h1280M0 380h1280M0 475h1280M0 570h1280M0 665h1280"/>
    <path d="M120 0v760M240 0v760M360 0v760M480 0v760M600 0v760M720 0v760M840 0v760M960 0v760M1080 0v760M1200 0v760"/>
  </g>
  <g transform="translate(40 38)">
    <rect width="42" height="42" rx="12" fill="#111711" stroke="#b9f251"/>
    <text x="21" y="27" text-anchor="middle" fill="#b9f251" font-family="Menlo, monospace" font-size="16" font-weight="800">IO</text>
    <text x="58" y="28" fill="#f6f1e8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">InterviewOS</text>
    <text x="932" y="28" fill="#d5ddd3" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">API • CLI • MCP</text>
    <rect x="1060" y="-2" width="170" height="48" rx="14" fill="url(#cta)"/>
    <text x="1145" y="29" text-anchor="middle" fill="#10150d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">Upload transcript</text>
  </g>
  <g transform="translate(40 135)">
    <text x="0" y="0" fill="#b9f251" font-family="Menlo, monospace" font-size="15" font-weight="900">AI-NATIVE INTERVIEW INTELLIGENCE</text>
    <text x="0" y="78" fill="#f6f1e8" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900">See whether</text>
    <text x="0" y="158" fill="#f6f1e8" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900">candidates can</text>
    <text x="0" y="238" fill="#f6f1e8" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900">actually think with AI.</text>
    <text x="0" y="300" fill="#d5ddd3" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Reviews code, transcript, tests, command traces, and AI usage.</text>
    <text x="0" y="333" fill="#d5ddd3" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Outputs evidence-backed candidate signal, not just a score.</text>
    <rect x="295" y="380" width="230" height="58" rx="14" fill="url(#cta)"/>
    <text x="410" y="416" text-anchor="middle" fill="#10150d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Upload AI transcript</text>
    <rect x="540" y="384" width="190" height="50" rx="12" fill="#151a1d" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="635" y="415" text-anchor="middle" fill="#f6f1e8" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Use demo packet</text>
  </g>
  <g transform="translate(760 126)" filter="url(#shadow)">
    <rect width="470" height="520" rx="24" fill="#171d20" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="28" y="45" fill="#b9f251" font-family="Menlo, monospace" font-size="15" font-weight="900">EVIDENCE PACKET</text>
    <rect x="260" y="25" width="170" height="40" rx="20" fill="#241f12" stroke="#ffd166" stroke-opacity="0.55"/>
    <text x="345" y="51" text-anchor="middle" fill="#ffd166" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">Waiting for transcript</text>
    <rect x="28" y="115" width="414" height="220" rx="22" fill="#202722" stroke="#b9f251" stroke-dasharray="4 5" stroke-opacity="0.35"/>
    <rect x="204" y="148" width="64" height="64" rx="20" fill="#3a5750" stroke="#55d8ff" stroke-opacity="0.7"/>
    <text x="235" y="254" text-anchor="middle" fill="#f6f1e8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900">Upload AI chat transcript</text>
    <text x="235" y="292" text-anchor="middle" fill="#aab5af" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="750">Attach repo diff, test log, command trace,</text>
    <text x="235" y="318" text-anchor="middle" fill="#aab5af" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="750">and final explanation.</text>
    <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#d5ddd3">
      <rect x="28" y="380" width="118" height="36" rx="18" fill="#1a1f21" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="87" y="403" text-anchor="middle">AI transcript</text>
      <rect x="156" y="380" width="86" height="36" rx="18" fill="#1a1f21" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="199" y="403" text-anchor="middle">Git diff</text>
      <rect x="252" y="380" width="90" height="36" rx="18" fill="#1a1f21" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="297" y="403" text-anchor="middle">Test log</text>
      <rect x="28" y="428" width="136" height="36" rx="18" fill="#1a1f21" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="96" y="451" text-anchor="middle">Command trace</text>
    </g>
  </g>
  <g transform="translate(40 570)">
    <rect width="230" height="92" rx="18" fill="#151a1d" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="20" y="30" fill="#aab5af" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">REST API</text>
    <text x="20" y="60" fill="#f6f1e8" font-family="Menlo, monospace" font-size="17" font-weight="900">POST /api/evaluations</text>
    <rect x="285" width="230" height="92" rx="18" fill="#151a1d" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="305" y="30" fill="#aab5af" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">CLI</text>
    <text x="305" y="60" fill="#f6f1e8" font-family="Menlo, monospace" font-size="17" font-weight="900">interviewos analyze</text>
    <rect x="530" width="230" height="92" rx="18" fill="#151a1d" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="550" y="30" fill="#aab5af" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">MCP</text>
    <text x="550" y="60" fill="#f6f1e8" font-family="Menlo, monospace" font-size="17" font-weight="900">interviewos_evaluate</text>
  </g>
</svg>
